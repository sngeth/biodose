name: Daily Article Update

on:
  schedule:
    # Run at 7:00 AM UTC (2:00 AM EST) every day
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest article
        run: node fetch-articles.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'BioDose Bot'
          git config --global user.email 'bot@biodose.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Daily update: $(date +'%Y-%m-%d')" && git push)
