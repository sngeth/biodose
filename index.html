<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioDose - Evidence-Based Health Optimization</title>
    <meta name="description" content="Daily peer-reviewed science on sleep, performance, longevity, and health optimization">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.8;
            color: #1a1a1a;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 40px;
            padding: 60px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 3.5em;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            margin-top: 15px;
            font-weight: 500;
        }

        .article-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .article-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            font-size: 1em;
            color: #64748b;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
        }

        .boost-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
            margin-bottom: 15px;
            display: inline-block;
        }

        h2 {
            font-size: 2.2em;
            line-height: 1.4;
            margin-bottom: 25px;
            color: #1a1a1a;
            font-weight: 700;
        }

        .authors {
            color: #555;
            margin-bottom: 10px;
            font-style: italic;
            font-size: 1.05em;
        }

        .journal {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 1.05em;
        }

        .abstract {
            background: #f8f9fb;
            padding: 30px;
            border-radius: 12px;
            margin: 30px 0;
            border-left: 5px solid #667eea;
            font-size: 1.05em;
            line-height: 1.8;
        }

        .abstract h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 1.3em;
            font-weight: 600;
        }

        .abstract p {
            color: #2d3748;
        }

        .action-steps {
            background: #fffbeb;
            border-left: 5px solid #f59e0b;
            padding: 30px;
            border-radius: 12px;
            margin: 30px 0;
        }

        .action-steps h3 {
            color: #ea580c;
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .action-steps ul {
            margin-left: 25px;
        }

        .action-steps li {
            margin: 12px 0;
            font-size: 1.05em;
            line-height: 1.7;
            color: #2d3748;
        }

        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            margin-top: 25px;
            transition: all 0.3s ease;
        }

        .cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        footer {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
            margin-top: 40px;
        }

        footer p {
            font-size: 1em;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 80px 20px;
            font-size: 1.3em;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5em;
            }

            .tagline {
                font-size: 1.1em;
            }

            .article-card {
                padding: 30px;
            }

            h2 {
                font-size: 1.7em;
            }

            .abstract, .action-steps {
                padding: 20px;
                font-size: 1em;
            }

            .cta {
                font-size: 1em;
                padding: 14px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ BioDose</h1>
            <p class="tagline">Your daily dose of evidence-based health optimization</p>
            <div class="badge">📚 Peer-Reviewed Science • 🔬 Free Access Journals</div>
        </header>

        <div id="content" class="loading">
            Loading today's optimization boost...
        </div>

        <footer>
            <p>All articles sourced from peer-reviewed, open-access journals</p>
            <p style="font-size: 0.9em; margin-top: 10px; opacity: 0.8;">
                Updated daily • PubMed Central • arXiv • PLOS
            </p>
        </footer>
    </div>

    <script>
        // Load article data
        fetch('latest-article.json')
            .then(res => res.json())
            .then(data => {
                const article = data.article;
                const content = document.getElementById('content');

                content.innerHTML = `
                    <div class="article-card">
                        <div class="boost-label">💡 Daily Optimization Boost</div>

                        <div class="article-meta">
                            <div class="meta-item">📅 ${formatDate(data.date)}</div>
                            <div class="meta-item">📖 ${article.journal}</div>
                            <div class="meta-item">✍️ ${article.authors}</div>
                        </div>

                        <h2>${article.title}</h2>

                        <div class="abstract">
                            <h3>📋 The Science</h3>
                            <p>${article.abstract || 'Abstract available in full paper.'}</p>
                        </div>

                        <div class="action-steps">
                            <h3>⚡ Action Steps</h3>
                            <p><em>Based on the research findings:</em></p>
                            <ul>
                                <li>Review the full study for specific protocols and dosages</li>
                                <li>Consult with a healthcare provider before making changes</li>
                                <li>Consider tracking your results if implementing</li>
                            </ul>
                        </div>

                        <a href="${article.url}" target="_blank" rel="noopener" class="cta">
                            📄 Read Full Study on PubMed →
                        </a>
                    </div>
                `;
            })
            .catch(err => {
                console.error('Error loading article:', err);
                document.getElementById('content').innerHTML = `
                    <div class="article-card">
                        <h2>🔄 Loading...</h2>
                        <p>Fetching today's article. This may take a moment on first load.</p>
                    </div>
                `;
            });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
    </script>
</body>
</html>
