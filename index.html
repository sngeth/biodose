<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioDose - Evidence-Based Health Optimization</title>
    <meta name="description" content="Daily peer-reviewed science on sleep, performance, longevity, and health optimization">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.65;
            color: #1a1a1a;
            background: #fff;
            padding: 0;
            margin: 0;
        }

        .nav {
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.02em;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            font-size: 0.875rem;
            color: #666;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #000;
        }

        .meta-badge {
            font-size: 0.75rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .date {
            font-size: 0.8125rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        h1 {
            font-size: 2.25rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: #000;
        }

        .meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e5e5e5;
        }

        .meta-item {
            font-size: 0.875rem;
            color: #666;
        }

        .content-section {
            margin-bottom: 32px;
        }

        .section-label {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #999;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .abstract-text {
            font-size: 1.0625rem;
            line-height: 1.75;
            color: #333;
        }

        .key-points {
            background: #fafafa;
            padding: 32px;
            margin: 32px 0;
            border-left: 3px solid #000;
        }

        .key-points h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #000;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .key-points ul {
            list-style: none;
            padding: 0;
        }

        .key-points li {
            font-size: 0.9375rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }

        .key-points li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #000;
        }

        .read-paper {
            display: inline-block;
            color: #000;
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 600;
            padding: 14px 28px;
            border: 2px solid #000;
            transition: all 0.2s;
            margin-top: 24px;
        }

        .read-paper:hover {
            background: #000;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid #e5e5e5;
            margin-top: 64px;
        }

        footer p {
            font-size: 0.8125rem;
            color: #999;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 100px 24px;
            color: #999;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
            }

            .container {
                padding: 40px 20px 80px;
            }

            .key-points {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo">BioDose</a>
            <div class="nav-links">
                <a href="archive.html" class="nav-link">Archive</a>
                <div class="meta-badge">Peer-Reviewed</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="content" class="loading">
            Loading...
        </div>
    </div>

    <footer>
        <p>All articles sourced from peer-reviewed, open-access journals</p>
        <p style="margin-top: 8px; font-size: 0.75rem;">PubMed Central · Updated Daily</p>
    </footer>

    <script>
        fetch('latest-article.json')
            .then(res => res.json())
            .then(data => {
                const article = data.article;
                const content = document.getElementById('content');

                content.innerHTML = `
                    <div class="date">${formatDate(data.date)}</div>

                    <h1>${article.title}</h1>

                    <div class="meta">
                        <div class="meta-item">${article.journal}</div>
                        <div class="meta-item">${article.authors}</div>
                        <div class="meta-item">${article.pubdate}</div>
                    </div>

                    ${article.abstract ? `
                    <div class="content-section">
                        <div class="section-label">Abstract</div>
                        <div class="abstract-text">${article.abstract}</div>
                    </div>
                    ` : ''}

                    <div class="key-points">
                        <h3>Key Takeaways</h3>
                        <ul>
                            <li>Review the full study for detailed methodology and protocols</li>
                            <li>Consult healthcare professionals before implementing changes</li>
                            <li>Consider your individual health context and goals</li>
                        </ul>
                    </div>

                    <a href="${article.url}" target="_blank" rel="noopener" class="read-paper">
                        Read Full Paper →
                    </a>
                `;
            })
            .catch(err => {
                console.error('Error loading article:', err);
                document.getElementById('content').innerHTML = `
                    <div class="loading">Unable to load article. Please refresh.</div>
                `;
            });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
    </script>
</body>
</html>
